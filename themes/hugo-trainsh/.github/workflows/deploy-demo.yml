name: Deploy theme Demo to Cloudflare Pages

on:
  push:
    paths-ignore:
      - "images/**"
      - "LICENSE"
      - "README.md"
    branches:
      - main
  workflow_dispatch:
    inputs:
      hugoVersion:
        description: "Hugo Version"
        required: false
        default: "0.148.0"

concurrency:
  group: "pages"
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: ${{ github.event.inputs.hugoVersion || '0.148.0' }}
      CLOUDFLARE_PAGES_PROJECT: hugo-trainsh
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O "${{ runner.temp }}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build with Hugo (exampleSite)
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo -s exampleSite --gc --minify --baseURL "https://${CLOUDFLARE_PAGES_PROJECT}.pages.dev"
      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
          auth=(-H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json")
          project="${CLOUDFLARE_PAGES_PROJECT}"

          status=$(curl -sS -o /tmp/project.json -w "%{http_code}" "${auth[@]}" "$api/$project")
          if [ "$status" = "404" ]; then
            create_resp=$(curl -sS -X POST "${auth[@]}" "$api" --data "{\"name\":\"${project}\",\"production_branch\":\"main\"}")
            success=$(echo "$create_resp" | jq -r '.success // false')
            if [ "$success" != "true" ]; then
              echo "Failed to create Pages project ${project}" >&2
              echo "$create_resp" >&2
              exit 1
            fi
          elif [ "$status" != "200" ]; then
            echo "Failed to read Pages project ${project} (status=${status})" >&2
            cat /tmp/project.json >&2
            exit 1
          fi
      - name: Deploy demo to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy exampleSite/public --project-name ${{ env.CLOUDFLARE_PAGES_PROJECT }} --branch main
